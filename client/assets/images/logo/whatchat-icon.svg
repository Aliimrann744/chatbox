<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#128C7E"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#0B7A65"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#003D2E" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle highlight -->
  <path d="M0 0 H1024 V512 Q512 320 0 512 Z" fill="#ffffff" opacity="0.08"/>

  <!-- Speech bubble -->
  <g filter="url(#shadow)">
    <path d="
      M 240 232
      H 784
      Q 864 232 864 312
      V 660
      Q 864 740 784 740
      H 456
      L 344 844
      Q 316 868 316 828
      V 740
      H 240
      Q 160 740 160 660
      V 312
      Q 160 232 240 232
      Z"
      fill="#ffffff"/>
  </g>

  <!-- Bold W glyph — constructed geometrically so it scales cleanly -->
  <path d="
    M 288 340
    L 380 340
    L 436 580
    L 496 340
    L 556 340
    L 616 580
    L 672 340
    L 764 340
    L 672 688
    L 568 688
    L 526 520
    L 484 688
    L 380 688
    Z"
    fill="url(#fg)"/>

  <!-- Three chat dots above the W, suggesting active messaging -->
  <circle cx="426" cy="280" r="22" fill="#ffffff" opacity="0.95"/>
  <circle cx="512" cy="264" r="22" fill="#ffffff" opacity="0.95"/>
  <circle cx="598" cy="280" r="22" fill="#ffffff" opacity="0.95"/>
</svg>
